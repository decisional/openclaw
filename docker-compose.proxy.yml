services:
  openclaw-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - openclaw-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/openclaw-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
